<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>我的 mc 生存存档网站</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <style>
      main,
      #footer {
        margin-left: 12px;
        margin-right: 12px;
      }

      main {
        margin-top: 70px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;

        background-image: url("/assets/images/2026-07-14_18.31.22.png");

        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;

        opacity: 0.2 !important;
        z-index: -1;
        pointer-events: none;
      }

      .dropdown-menu > li > a:hover,
      .dropdown-menu > li > a:focus,
      .navbar-default .navbar-nav > li > a:focus,
      .navbar-default .navbar-nav > li > a:hover,
      .navbar-default .navbar-nav > .active > a:focus,
      .navbar-default .navbar-nav > .active > a:hover {
        background-color: #337ab7;
        color: white;
      }

      #words {
        text-indent: 2em;
      }

      check {
        margin-left: 2em;
      }

      label {
        font-weight: 400;
      }

      a:hover,
      a:focus {
        text-decoration: none;
      }

      main img {
        width: 100%;
        max-width: 800px;
        height: auto;
        display: block;
        margin: 0 auto;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <header>
    <nav class="navbar navbar-default navbar-fixed-top" role="navigation">
      <div class="container-fluid">
        <div class="navbar-header">
          <button
            type="button"
            class="navbar-toggle"
            data-toggle="collapse"
            data-target="#example-navbar-collapse"
          >
            <span class="sr-only">切换导航</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="/">我的 mc 生存存档网站</a>
        </div>
        <div class="collapse navbar-collapse" id="example-navbar-collapse">
          <ul class="nav navbar-nav">
            <li class="active">
              <a href="/"
                ><iconify-icon icon="mdi:home-variant"></iconify-icon> 首页</a
              >
            </li>
            <li>
              <a href="/places/"
                ><iconify-icon icon="mdi:location-radius"></iconify-icon>
                地点</a
              >
            </li>
            <li class="dropdown">
              <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                <iconify-icon icon="mdi:info"></iconify-icon> 本存档相关信息
                <b class="caret"></b>
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a
                    href="javascript:void(0)"
                    data-toggle="modal"
                    data-target="#saveSeedModal"
                    >获取种子
                    <iconify-icon icon="ic:outline-link"></iconify-icon
                  ></a>
                </li>
                <li class="divider"></li>
                <li><a href="#">另一个分离的链接</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
</html>

<div
  class="modal fade"
  id="saveSeedModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="saveSeedModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button
          type="button"
          class="close"
          data-dismiss="modal"
          aria-hidden="true"
        >
          &times;
        </button>
        <h4 class="modal-title" id="saveSeedModalLabel">
          <iconify-icon icon="mdi:map-search"></iconify-icon> 本存档种子
        </h4>
      </div>
      <div class="modal-body">
        <p>
          <code id="seed">3839762216283805005</code>
        </p>
      </div>
      <div class="modal-footer">
        <button
          id="copy-btn"
          type="button"
          class="btn btn-primary"
          onclick="copySaveSeed()"
        >
          <iconify-icon icon="si:copy-line"></iconify-icon> 复制
        </button>
        <button type="button" class="btn btn-default" data-dismiss="modal">
          关闭
        </button>
      </div>
    </div>
  </div>
</div>
